<!DOCTYPE html>
<html>
<head>
    <title>Student Hub</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 70%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        #posts {
            margin-top: 20px;
            text-align: left;
        }

        .post {
            background: #e3f2fd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>Student Hub</h1>
        <p>Communicate and share materials</p>

        <h3>Posts</h3>
        <div id="posts"></div>

        <input type="text" id="postInput" placeholder="Write something..." />
        <br>
        <button onclick="addPost()">Post</button>
    </div>

    <script>
        function addPost() {
            let input = document.getElementById("postInput");
            let postText = input.value;

            if (postText === "") return;

            let postDiv = document.createElement("div");
            postDiv.className = "post";
            postDiv.innerText = postText;

            document.getElementById("posts").appendChild(postDiv);

            input.value = "";
        }
    </script>

</body>
</html>
