<!DOCTYPE html>
<html>
<head>
    <title>Student Hub</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 70%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        #posts {
            margin-top: 20px;
            text-align: left;
        }

        .post {
            background: #e3f2fd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>Student Hub</h1>
        <p>Communicate and share materials</p>
<h3>Login</h3>
<input type="email" id="email" placeholder="Email" />
<br>
<input type="password" id="password" placeholder="Password" />
<br>
<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Sign In</button>

<p id="userInfo"></p>
        <h3>Posts</h3>
        <div id="posts"></div>

        <input type="text" id="postInput" placeholder="Write something..." />
        <br>
        <button onclick="addPost()">Post</button>
    </div>

 <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
    // Sign up
async function signUp() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabaseClient.auth.signUp({
        email,
        password
    });

    if (error) {
        alert(error.message);
    } else {
        alert("Check your email!");
    }
}

// Sign in
async function signIn() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        alert(error.message);
    } else {
        document.getElementById("userInfo").innerText =
            "Logged in as: " + data.user.email;
    }
}
const supabaseUrl = "https://fmlitydfcydcnnumhmyo.supabase.co";
const supabaseKey = "sb_publishable_WX8hbbfYCzNZIVqvq5Wsjw_LrABY0eZ";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// Add post
async function addPost() {
    let input = document.getElementById("postInput");
    let text = input.value;

    if (text === "") return;

    const { error } = await supabaseClient
        .from("posts")
        .insert([{ text: text }]);

    if (error) {
        console.error(error);
        return;
    }

    input.value = "";
    await loadPosts(); // force refresh
}

// Load posts
async function loadPosts() {
    const { data, error } = await supabaseClient
        .from("posts")
        .select("*")
        .order("created_at", { ascending: true });

    if (error) {
        console.error(error);
        return;
    }

    const postsDiv = document.getElementById("posts");
    postsDiv.innerHTML = "";

    data.forEach(post => {
        let div = document.createElement("div");
        div.className = "post";
        div.innerText = post.text;
        postsDiv.appendChild(div);
    });
}

// Auto refresh every 2 seconds (simple real-time)
setInterval(loadPosts, 2000);

// First load
loadPosts();
</script>

</body>
</html>
