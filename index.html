<!DOCTYPE html>
<html>
<head>
    <title>Student Hub</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            margin-top: 50px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 70%;
            padding: 10px;
            margin-top: 10px;
        }

        button {
            padding: 10px 15px;
            margin-top: 10px;
            cursor: pointer;
        }

        #posts {
            margin-top: 20px;
            text-align: left;
        }

        .post {
            background: #e3f2fd;
            padding: 10px;
            margin-top: 10px;
            border-radius: 5px;
        }
    </style>

</head>
<body>

    <div class="container">
        <h1>Student Hub</h1>
        <p>Communicate and share materials</p>
<h3>Login</h3>
        <input type="text" id="name" placeholder="Your name" />
<input type="email" id="email" placeholder="Email" />
<br>
<input type="password" id="password" placeholder="Password" />
<br>
<button onclick="signUp()">Sign Up</button>
<button onclick="signIn()">Sign In</button>

<p id="userInfo"></p>
        <p id="userEmail"></p>
<button onclick="logout()">Logout</button>
        <h3>Posts</h3>
        <div id="posts"></div>

        <input type="text" id="postInput" placeholder="Write something..." />
        <br>
        <button onclick="addPost()">Post</button>
    </div>

 <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>
    async function showUser() {
    const { data: { user } } = await supabaseClient.auth.getUser();

    if (user) {
        document.getElementById("userEmail").innerText = user.email;
    }
}
    async function logout() {
    await supabaseClient.auth.signOut();
    location.reload();
}
    // Sign up
async function signUp() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const name = document.getElementById("name").value;

    const { error } = await supabaseClient.auth.signUp({
        email,
        password,
        options: {
            data: {
                name: name
            }
        }
    });

    if (error) {
        alert(error.message);
    } else {
        alert("Account created!");
    }
}

// Sign in
async function signIn() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
    });

    if (error) {
        alert(error.message);
    } else {
        document.getElementById("userInfo").innerText =
            "Logged in as: " + data.user.email;

        await showUser();   // ✅ refresh user display
        await loadPosts();  // ✅ load posts immediately
    }
}
const supabaseUrl = "https://fmlitydfcydcnnumhmyo.supabase.co";
const supabaseKey = "sb_publishable_WX8hbbfYCzNZIVqvq5Wsjw_LrABY0eZ";

const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

// Add post
async function addPost() {
    console.log("Button clicked"); // ✅ debug

    let input = document.getElementById("postInput");
    let text = input.value;

    if (text === "") return;

    const { data: { user } } = await supabaseClient.auth.getUser();

    if (!user) {
        alert("You must be logged in");
        return;
    }

    const name = user.user_metadata?.name || "User";

    const { error } = await supabaseClient
        .from("posts")
        .insert([{
            text: text,
            user_id: user.id,
            name: name
        }]);

    // ✅ improved error handling
    if (error) {
        console.error("INSERT ERROR:", error);
        alert(error.message);
        return;
    }

    input.value = "";
    loadPosts();
}

// Load posts
let loadedPostIds = new Set();

async function loadPosts() {
    let postsDiv = document.getElementById("posts");

    const { data, error } = await supabaseClient
        .from("posts")
        .select("*")
        .order("created_at", { ascending: true })
        .limit(20);

    if (!data) return;

    data.forEach(post => {
        if (loadedPostIds.has(post.id)) return; // ✅ skip existing

        loadedPostIds.add(post.id);

        let div = document.createElement("div");
        div.className = "post";
        div.innerText = (post.name || "Unknown") + ": " + post.text;

        postsDiv.appendChild(div);
    });
}

// Auto refresh every 2 seconds (simple real-time)
// setInterval(loadPosts, 2000);

// First load
  async function init() {
    await showUser();
    await loadPosts();
}

init();

  
</script>

</body>
</html>
